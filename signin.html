  <section class="ezy__signin4 light d-flex">
  <div class="container">
    <div class="row justify-content-between h-100">
      <div class="col-lg-6 py-5">
        <div class="row align-items-center h-100 px-lg-5">
          <div class="col-12">
            <div class="card ezy__signin4-form-card">
              <div class="card-body p-md-5">
                <h2 class="ezy__signin4-heading mb-3">Welcome to Yummy Recipe</h2>
                <p class="mb-4 mb-md-5">
                  <span class="opacity-50 me-2">Don't have an account?</span>
                  <a href="signup.html" class="btn btn-link p-0 text-dark text-decoration-none">Create account</a>
                </p>

                <form>
                  <div class="form-group mb-4 mt-2">
                    <label for="email" class="mb-2">Email Address</label>
                    <input type="text" class="form-control" id="email" placeholder="Enter Email Address" />
                  </div>
                  <div class="form-group mb-2 mt-2">
                    <label for="password" class="mb-2">Password</label>
                    <input type="password" class="form-control" id="password" placeholder="Enter Password" />
                  </div>
                  <div class="form-group mb-3">
                    <div class="form-check">
                      <input class="form-check-input" type="checkbox" value="" id="remember-me" checked />
                      <label class="form-check-label" for="remember-me"> Remember me </label>
                    </div>
                  </div>
                  <button type="submit" class="btn ezy__signin4-btn-submit w-100">
                    Log In
                    <span class="fas fa-arrow-right ms-2 text-white"></span>
                  </button>
                  <button class="btn w-100">Forget your password?</button>

                  <div class="position-relative ezy__signin4-or-separator">
                    <hr class="my-4 my-md-5" />
                    <span class="px-2">Or</span>
                  </div>

                  <button class="btn btn-primary ezy__signin4-btn w-100 d-flex align-items-center mb-3">
                    <span class="fab fa-facebook text-white fs-4"></span>
                    <span class="w-100 text-center text-white">Continue with Facebook</span>
                  </button>
                  <button class="btn btn-danger ezy__signin4-btn w-100 d-flex align-items-center">
                    <span class="fab fa-google text-white fs-4"></span>
                    <span class="w-100 text-center text-white">Continue with Google</span>
                  </button>
                </form>
              </div>
            </div>

        </div>
